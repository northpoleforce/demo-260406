<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E1001 Dashboard Viewport</title>
    <style>
        /* CSS里直接把body大小卡死，强迫设计师针对墨水屏进行布局设计 */
        body {
            width: 800px;
            height: 480px;
            margin: 0;
            padding: 0;
            background-color: white; /* 墨水屏底色需为白 */
            color: black;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 5px solid black; /* 防止边缘漏色测试框架 */
            box-sizing: border-box;
        }

        .header {
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid black;
            padding-bottom: 10px;
            margin-bottom: 40px;
        }

        .time-display {
            font-size: 110px;
            font-weight: 900;
        }

        .status-box {
            margin-top: 40px;
            padding: 10px 30px;
            border: 2px dashed black;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <div class="header">e1001 Real-time Sync Hub</div>
    
    <!-- 客户端每次触发请求，服务器抓到这时的最新时间 -->
    <div class="time-display" id="timeClock">--:--:--</div>
    
    <div class="status-box">Status: <b>Connected & Live</b></div>

    <script>
        // 利用脚本在页面加载瞬间生成一些极其“动态”的数据，验证无头浏览器的威力
        const date = new Date();
        document.getElementById('timeClock').innerText = 
            date.getHours().toString().padStart(2, '0') + ":" + 
            date.getMinutes().toString().padStart(2, '0') + ":" + 
            date.getSeconds().toString().padStart(2, '0');
    </script>
</body>
</html>
